<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikharr</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div>
        <h2 id="hd">Shikharr Noob </h2>
        <p id="prop"> Gay Activist<br>
            Retard Chaser<br>
            Chaewon Lover<br>
            RR Final Boss<br>
        </p>
    </div>
    <span id="shik">
        <img src="shik1.jpeg" alt="Shikharr" class="profile-img default-img">
        <img src="shik2.png" alt="Shikharr" class="profile-img hover-img">
    </span>
    <script>
        const shik = document.getElementById('shik');
        const audio = new Audio('website_song_short_40s.mp3');
        
        shik.addEventListener('mouseenter', () => {
            audio.currentTime = 0;
            audio.play().catch(error => {
                console.log('Audio playback prevented until user interacts with the document first:', error);
            });
        });
        
        shik.addEventListener('mouseleave', () => {
            audio.pause();
        });
    </script>
</body>

</html>
