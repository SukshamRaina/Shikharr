<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikharr</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div>
        <h2 id="hd">Shikharr Noob</h2>

        <p id="prop">
            Gay Activist<br>
            Retard Chaser<br>
            Chaewon Lover<br>
            RR Final Boss<br>
        </p>
    </div>

    <span id="shik">
        <img src="shik1.jpeg" alt="Shikharr" class="profile-img default-img">
        <img src="shik2.png" alt="Shikharr" class="profile-img hover-img">
    </span>

    <audio id="bgMusic" loop>
        <source src="website_song_short_40s.mp3" type="audio/mpeg">
    </audio>

    <script>
        const shik = document.getElementById("shik");
        const music = document.getElementById("bgMusic");

        shik.addEventListener("mouseenter", () => {
            music.play().catch(err => console.log(err));
        });

        shik.addEventListener("mouseleave", () => {
            music.pause();
        });

        // Toggle play/pause on click (also satisfies user interaction requirement)
        shik.addEventListener("click", () => {
            if (music.paused) {
                music.play().catch(err => console.log(err));
            } else {
                music.pause();
            }
        });
    </script>

</body>
</html>
